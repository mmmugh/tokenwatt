name: Release

# Publish to PyPI on a version tag (e.g. `v0.2.0`), via PyPI Trusted Publishing (OIDC — no token).
# Requires a PyPI "(pending) publisher" configured for: repo mmmugh/tokenwatt, workflow `release.yml`,
# Environment `pypi` — matched by the job's `environment:` below.
on:
  push:
    tags: ["v*"]

jobs:
  pypi-publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest          # the wheel is pure-Python; no Apple Silicon needed to build
    environment:
      name: pypi                    # must match the Environment on the PyPI trusted publisher
      url: https://pypi.org/project/tokenwatt/
    permissions:
      id-token: write               # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
