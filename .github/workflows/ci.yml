name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE']   # don't burn macOS minutes on docs-only commits
  pull_request:
    paths-ignore: ['**.md', 'docs/**', 'LICENSE']

# cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    # Apple Silicon (arm64) — TokenWatt's target platform; macos-latest is arm64.
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]   # full supported range (public repo → free Actions)
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Sync (with dev deps)
        run: uv sync --extra dev --python ${{ matrix.python-version }}
      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest -q

  build:
    name: build (sdist + wheel) + metadata check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Build distributions
        run: uv build
      - name: Validate package metadata (renders on PyPI)
        run: uvx twine check dist/*
      - name: Smoke-test the built wheel in a clean env
        run: uvx --from dist/*.whl tokenwatt --version
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
